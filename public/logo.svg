<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d172a" />
      <stop offset="100%" stop-color="#070a13" />
    </radialGradient>
    
    <linearGradient id="trailGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0" />
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="1" />
    </linearGradient>
    
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <path d="M 120 390 C 120 270, 392 350, 392 210 C 392 130, 310 90, 256 90" 
        fill="none" 
        stroke="url(#trailGrad)" 
        stroke-width="36" 
        stroke-linecap="round" />

  <circle cx="256" cy="90" r="45" fill="#58a6ff" filter="url(#glow)" />
  <circle cx="256" cy="90" r="22" fill="#ffffff" />
</svg>

