<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zen Drift — Relaxing Arcade Game by Kiran Mondal</title>
  <meta name="title" content="Zen Drift — Relaxing Arcade Game by Kiran Mondal">
  <meta name="description" content="Play Zen Drift, a beautiful, high-satisfaction relaxing arcade game developed by Kiran Mondal (Babai). Dodge obstacles, collect golden stars, and top the leaderboard!">
  <meta name="keywords" content="Zen Drift, Kiran Mondal, Babai, Kiran Mondal Games, Zen Drift Game, Relaxing Game, HTML5 Arcade Game, Neon Game, JavaScript Game">
  <meta name="author" content="Kiran Mondal (Babai)">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Zen Drift — Relaxing Arcade Game by Kiran Mondal">
  <meta property="og:description" content="Play Zen Drift, a beautiful, high-satisfaction relaxing arcade game developed by Kiran Mondal. Dodge obstacles, collect golden stars, and top the leaderboard!">
  <meta property="og:image" content="/logo.svg">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Zen Drift — Relaxing Arcade Game by Kiran Mondal">
  <meta property="twitter:description" content="Play Zen Drift, a beautiful, high-satisfaction relaxing arcade game developed by Kiran Mondal.">
  <meta property="twitter:image" content="/logo.svg">

  <link rel="icon" type="image/svg+xml" href="/logo.svg">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #090d16;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #adbac7;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      touch-action: none; /* মোবাইলে ৩ মিলি-সেকেন্ডের টাচ ডিলে সম্পূর্ণ রিমুভ করার জন্য */
    }
    .ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .interactive {
      pointer-events: auto;
    }
    /* গ্লাসি বা ফ্রস্টেড গ্লাস ডিজাইন */
    .glass-panel {
      background: rgba(13, 17, 23, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(240, 246, 252, 0.1);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #58a6ff;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 13px;
      color: #768390;
      margin-bottom: 20px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid #444c56;
      border-radius: 8px;
      color: #adbac7;
      font-size: 14px;
      text-align: center;
      margin-bottom: 16px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #58a6ff;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #238636;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active {
      background: #2ea043;
    }
    /* রিয়েল-টাইম স্কোর স্টাইল */
    .score-banner {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #adbac7;
      background: rgba(13, 17, 23, 0.6);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(240, 246, 252, 0.05);
    }
    #scoreVal {
      color: #f8e3a1;
    }
    /* লিডারবোর্ড ডিজাইন */
    .leaderboard-title {
      font-size: 14px;
      font-weight: bold;
      color: #768390;
      margin-top: 20px;
      margin-bottom: 10px;
      text-align: left;
      border-bottom: 1px solid rgba(240, 246, 252, 0.1);
      padding-bottom: 6px;
    }
    .leaderboard-entries {
      max-height: 150px;
      overflow-y: auto;
    }
    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(240, 246, 252, 0.03);
    }
    .leaderboard-row:last-child {
      border-bottom: none;
    }
    /* গেম ওভার অ্যালার্ট পপআপ */
    #customAlert {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #alertBtn {
      background: #21262d;
      border: 1px solid #444c56;
    }
    #alertBtn:active {
      background: #30363d;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div class="ui-container">
    <div class="score-banner">Score: <span id="scoreVal">0</span></div>

    <div id="menu" class="glass-panel interactive">
      <h1>Zen Drift</h1>
      <div class="subtitle">Drift through obstacles & gather stars</div>
      <input type="text" id="username" placeholder="Enter Player Name" maxlength="15" value="Player 1">
      <button id="startBtn">START GAME</button>
      
      <div class="leaderboard-title">🏆 Top Drift Leaders</div>
      <div id="leaderboardEntries" class="leaderboard-entries">
        </div>
    </div>

    <div id="customAlert" class="glass-panel interactive">
      <h1 style="color: #ff7b72;">Game Over</h1>
      <p id="alertMsg" style="margin: 15px 0; font-size: 16px;"></p>
      <button id="alertBtn">BACK TO MENU</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
