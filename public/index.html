<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zen Drift</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #090d16;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e6edf3;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
      pointer-events: none;
    }
    .score-container {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      text-align: center;
      background: rgba(13, 17, 23, 0.85);
      padding: 30px;
      border-radius: 16px;
      border: 1px solid rgba(88, 166, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 400px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 15px;
      color: #58a6ff;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    p {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 25px;
      line-height: 1.6;
    }
    input {
      width: 100%;
      padding: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #fff;
      margin-bottom: 15px;
      outline: none;
      text-align: center;
      font-size: 16px;
    }
    input:focus {
      border-color: #58a6ff;
    }
    button {
      background: #238636;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover {
      background: #2ea043;
    }
    #leaderboard {
      margin-top: 20px;
      text-align: left;
      font-size: 13px;
    }
    .leaderboard-title {
      color: #58a6ff;
      border-bottom: 1px solid #30363d;
      padding-bottom: 5px;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      color: #c9d1d9;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="score-container">Score: <span id="scoreVal">0</span></div>
  </div>

  <div id="menu">
    <h1>Zen Drift</h1>
    <p>A minimalist game to calm your mind. Drag your finger or mouse to avoid obstacles and collect glowing stars.</p>
    <input type="text" id="username" placeholder="Enter your name" maxlength="15" value="Player">
    <button id="startBtn">Play Game</button>
    <div id="leaderboard">
      <div class="leaderboard-title">Top 10 Scores (Neon DB)</div>
      <div id="leaderboardEntries">Loading...</div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="/game.js"></script>
</body>
</html>
